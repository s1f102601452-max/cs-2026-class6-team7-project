        <h2>Minecraftってどんなゲーム</h2> 
        <p>
Minecraft（マインクラフト）は、ブロックでできた広大な世界を自由に探索・建築できるサンドボックス型ゲームです。
プレイヤーは資源を集めて道具や建物を作ったり、サバイバルモードではモンスターと戦ったりしながら生き延びます。
クリエイティブモードでは無限のブロックを使って自由に建築を楽しむことができます。
</p>


        <h2>Minecraftの魅力</h2>
        <p>Minecraftは無限の可能性を秘めたオープンワールドゲームです。自由に建築し、採掘して、怪物と戦うことができます。</p>
